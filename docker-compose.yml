services:
  dendrite:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./dendrite.config.yaml:/app/dendrite.config.yaml:ro
      - ./compartments.yaml:/app/compartments.yaml:ro
      - ./vault:/vault
      - dendrite-data:/root/.local/share/dendrite
    ports:
      - "8787:8787"
    command: ["node", "dist/cli.js", "serve"]

volumes:
  dendrite-data:
