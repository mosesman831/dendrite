<!DOCTYPE html>
<html lang="en">
<head>
  <title>Dendrite Dashboard</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="stylesheet" href="/dashboard/style.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="tabs">
        <button class="tab active" data-tab="glance">Quick Glance</button>
        <button class="tab" data-tab="triage">Triage</button>
      </div>
      <div class="logo">🧠 Dendrite</div>
    </header>

    <main>
      <!-- Quick Glance -->
      <section id="view-glance" class="view active">
        <div class="stats-row" id="stats-cards"></div>
        <h2 class="section-header">COMPARTMENTS</h2>
        <div id="compartment-bars"></div>
        <h2 class="section-header">LATEST CAPTURE</h2>
        <div id="latest-capture"></div>
      </section>

      <!-- Triage -->
      <section id="view-triage" class="view hidden">
        <h2 class="section-header">INBOX QUEUE <span id="inbox-count-badge" class="count-badge"></span></h2>
        <div id="inbox-queue"></div>
        <div id="inbox-empty" class="empty-state hidden">Inbox is empty. Nothing to triage.</div>
        <h2 class="section-header">RECENT CAPTURES</h2>
        <div id="recent-captures"></div>
        <button class="btn refresh-btn" id="refresh-inbox">↻ Refresh inbox</button>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <div id="modal" class="modal hidden"></div>
  </div>
  <script src="/dashboard/app.js"></script>
</body>
</html>
